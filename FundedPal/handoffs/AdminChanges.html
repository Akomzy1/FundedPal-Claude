document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

quested <span class=\"tok\">on-demand</span> after a</span></div>\n              <div class=\"ln add\"><span class=\"gutter\">73</span><span class=\"ln-content\">     minimum of $50 in net profit, processed within</span></div>\n              <div class=\"ln add\"><span class=\"gutter\">74</span><span class=\"ln-content\">     <span class=\"tok\">2 business days.</span></span></div>\n              <div class=\"ln add\"><span class=\"gutter\">75</span><span class=\"ln-content\">5.3  First payout requires 8 trading days post-funding.</span></div>\n              <div class=\"ln ctx\"><span class=\"gutter\">76</span><span class=\"ln-content\"></span></div>\n              <div class=\"ln add\"><span class=\"gutter\">77</span><span class=\"ln-content\">5.4  Eligible withdrawal methods: wire transfer, Rise,</span></div>\n              <div class=\"ln add\"><span class=\"gutter\">78</span><span class=\"ln-content\">     <span class=\"tok\">USDC (ERC-20),</span> Wise.</span></div>\n              <div class=\"ln hunk\"><span class=\"gutter\">@@</span><span class=\"ln-content\">§ 5a. NEW — Mandatory KYC re-verification</span></div>\n              <div class=\"ln add\"><span class=\"gutter\">79</span><span class=\"ln-content\">5a.1 <span class=\"tok\">Funded traders must re-verify identity</span></span></div>\n              <div class=\"ln add\"><span class=\"gutter\">80</span><span class=\"ln-content\">     <span class=\"tok\">after every $25,000 in cumulative payouts.</span></span></div>\n              <div class=\"ln add\"><span class=\"gutter\">81</span><span class=\"ln-content\">5a.2 Re-verification window: 14 days. Failure to</span></div>\n              <div class=\"ln add\"><span class=\"gutter\">82</span><span class=\"ln-content\">     comply <span class=\"tok\">pauses payouts</span> until completion.</span></div>\n            </div>\n          </div>\n        </div>\n      </div>\n    </section>\n    <section class=\"review-section\">\n      <div class=\"review-left\">\n        <h2>Review notes</h2>\n        <p class=\"review-sub\">Document your reasoning — the trader-facing changelog will reference this verbatim. Be specific about which clauses you tested against historical accounts and which need re-running through the compliance simulator.</p>\n        <textarea id=\"review-notes\" placeholder=\"• Tightened consistency rule (40% → 25%) is the headline change.&#10;• Daily-loss and max-drawdown both reduced by 1pt — recompute risk scores for 38 active Meridian accounts.&#10;• New §5a KYC re-verification clause is unprecedented for this firm — flag to legal before publishing changelog entry.&#10;• Recommend: 'Breaking change' — push notification to all FRM-001 holders within 24h.\"></textarea>\n        <div class=\"ta-foot\"><span id=\"char-count\">0 characters · autosaved 2s ago</span><span><kbd>⌘</kbd> + <kbd>Enter</kbd> submits as Minor update</span></div>\n      </div>\n      <aside class=\"actions-card\">\n        <h3>Decision <span class=\"rule\"></span></h3>\n        <div class=\"actions-list\">\n          <button class=\"action\" data-sev=\"none\" type=\"button\"><span class=\"sev-dot\"></span><span class=\"body\"><span class=\"ttl\">No change <span style=\"color:var(--bone-faint);font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:400;margin-left:4px\">false positive</span></span><span class=\"sub\">Discard the snapshot; the diff is cosmetic only.</span></span><span class=\"kbd\">1</span><div class=\"tip\" data-sev=\"none\" role=\"tooltip\"><div class=\"tip-head\"><span class=\"sev-dot\"></span>Outcome · discard</div><div class=\"tip-body\">Snapshot is archived but <b>not surfaced</b> to traders. The firm's score and rule summary remain unchanged. The crawler is told to <b>re-baseline</b> against this version so it stops re-flagging the same noise.</div></div></button>\n          <button class=\"action\" data-sev=\"minor\" type=\"button\"><span class=\"sev-dot\"></span><span class=\"body\"><span class=\"ttl\">Minor update</span><span class=\"sub\">Wording, links, dates — no rule-engine impact.</span></span><span class=\"kbd\">2</span><div class=\"tip\" data-sev=\"minor\" role=\"tooltip\"><div class=\"tip-head\"><span class=\"sev-dot\"></span>Outcome · log only</div><div class=\"tip-body\">Snapshot is published to the <b>public changelog</b> under \"Cosmetic\". No push notifications. No score adjustment. Firm's <b>rule fingerprint</b> stays valid — existing user backtests and risk models do not need to be re-run.</div></div></button>\n          <button class=\"action\" data-sev=\"significant\" type=\"button\"><span class=\"sev-dot\"></span><span class=\"body\"><span class=\"ttl\">Significant change</span><span class=\"sub\">New clause or threshold; users should know.</span></span><span class=\"kbd\">3</span><div class=\"tip\" data-sev=\"significant\" role=\"tooltip\"><div class=\"tip-head\"><span class=\"sev-dot\"></span>Outcome · notify</div><div class=\"tip-body\">Triggers an <b>in-app banner</b> for all users holding accounts at this firm, and an email digest within 24h. <b>Health score is re-weighted</b>. Backtests against the affected rule are flagged stale but still readable.</div></div></button>\n          <button class=\"action\" data-sev=\"breaking\" type=\"button\"><span class=\"sev-dot\"></span><span class=\"body\"><span class=\"ttl\">Breaking change</span><span class=\"sub\">Risk-engine impact; immediate action required.</span></span><span class=\"kbd\">4</span><div class=\"tip\" data-sev=\"breaking\" role=\"tooltip\"><div class=\"tip-head\"><span class=\"sev-dot\"></span>Outcome · halt &amp; rebuild</div><div class=\"tip-body\"><b>Push notification</b> to every affected trader within 5 minutes. Firm's risk model is <b>marked invalid</b>; active backtests are paused. Compliance is paged. <b>Legal review</b> is required before the trader-facing rule summary is updated.</div></div></button>\n        </div>\n        <div class=\"actions-foot\"><b>You</b> are reviewing as <span style=\"color:var(--champagne)\">admin · clara.k</span> · <br>all actions are signed, logged, and irreversible without a second-admin override.</div>\n      </aside>\n    </section>\n  </section>\n</main>\n<script>\n  const viewList = document.getElementById('view-list');\n  const viewDetail = document.getElementById('view-detail');\n  const crumbLeaf = document.getElementById('crumb-leaf');\n  const FIRMS = {\n    meridian:  { name: 'Meridian Capital',   letter: 'M', cls: 'firm-meridian' },\n    archetype: { name: 'Archetype Trading',  letter: 'A', cls: 'firm-archetype' },\n    kestrel:   { name: 'Kestrel Markets',    letter: 'K', cls: 'firm-kestrel' },\n    northgate: { name: 'Northgate Prop',     letter: 'N', cls: 'firm-northgate' },\n    prima:     { name: 'Prima Desk',         letter: 'P', cls: 'firm-prima' },\n    vector:    { name: 'Vector Prop',        letter: 'V', cls: 'firm-vector' },\n  };\n  function showList(){\n    viewList.classList.add('is-active');\n    viewDetail.classList.remove('is-active');\n    crumbLeaf.textContent = 'changes';\n    document.body.dataset.screenLabel = '01 Admin · Changes List';\n    window.scrollTo({ top: 0, behavior: 'instant' in window ? 'instant' : 'auto' });\n  }\n  function showDetail(row){\n    const firmKey = row.dataset.firm;\n    const id = row.dataset.id;\n    const firm = FIRMS[firmKey] || FIRMS.meridian;\n    const block = document.getElementById('detail-firm-block');\n    block.className = 'detail-firm ' + firm.cls;\n    document.getElementById('detail-logo').textContent = firm.letter;\n    document.getElementById('detail-firm-name').textContent = firm.name;\n    const url = row.querySelector('.url-cell');\n    const urlText = url ? url.textContent.replace(/\\s+/g,'').trim() : '';\n    const urlEl = document.getElementById('detail-url');\n    urlEl.textContent = urlText;\n    urlEl.href = urlText;\n    document.getElementById('detail-id').textContent = id;\n    const dateCell = row.querySelector('.detected-cell');\n    document.getElementById('detail-detected').textContent = dateCell ? dateCell.textContent.trim().replace(/\\s+/g,' ') : '';\n    viewDetail.classList.add('is-active');\n    viewList.classList.remove('is-active');\n    crumbLeaf.textContent = id;\n    document.body.dataset.screenLabel = '02 Admin · Change Detail';\n    window.scrollTo({ top: 0, behavior: 'instant' in window ? 'instant' : 'auto' });\n  }\n  document.querySelectorAll('table.changes tbody tr').forEach(tr => {\n    tr.addEventListener('click', () => showDetail(tr));\n  });\n  document.getElementById('back-link').addEventListener('click', (e) => {\n    e.preventDefault();\n    showList();\n  });\n  const ta = document.getElementById('review-notes');\n  const cc = document.getElementById('char-count');\n  function updateCount(){\n    const n = ta.value.length;\n    cc.textContent = n + ' characters · autosaved ' + (n ? '2s' : '—') + ' ago';\n  }\n  ta.addEventListener('input', updateCount);\n  document.addEventListener('keydown', (e) => {\n    if (!viewDetail.classList.contains('is-active')) return;\n    if (document.activeElement && document.activeElement.tagName === 'TEXTAREA') return;\n    const map = { '1':'none', '2':'minor', '3':'significant', '4':'breaking' };\n    if (map[e.key]){\n      const btn = document.querySelector('.action[data-sev=\"'+map[e.key]+'\"]');\n      if (btn){\n        btn.classList.add('flash');\n        btn.focus();\n        setTimeout(() => btn.classList.remove('flash'), 200);\n      }\n    }\n  });\n<\/script>\n</body></html>"
  </script>
