document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

s=\"lhs\">\n              <span class=\"n\">05<\u002Fspan>\n              <h2>How it works<\u002Fh2>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"how-card\">\n            <h3>How FundedPal referrals work<\u002Fh3>\n            <div class=\"how-prose\">\n              <p>\n                <span class=\"step-n\">01<\u002Fspan>\n                Share your link with prop traders you know — people running real challenges who would actually benefit from broker-bridge guardrails. The narrower the audience, the higher the conversion.\n              <\u002Fp>\n              <p>\n                <span class=\"step-n\">02<\u002Fspan>\n                When someone signs up through your link and completes their first paid month — not the trial, the first full month they pay for — you both win.\n              <\u002Fp>\n              <p>\n                <span class=\"step-n\">03<\u002Fspan>\n                They get <strong>50% off their first paid month<\u002Fstrong>. You get a credit equal to <strong>your subscription tier<\u002Fstrong> — currently <em>$39<\u002Fem> on Pro — applied to your next invoice.\n              <\u002Fp>\n              <p>\n                <span class=\"step-n\">04<\u002Fspan>\n                You can earn credits on up to <strong>6 paid referrals in any 12-month rolling window<\u002Fstrong>. Past that, your link still works and your friends still get 50% off, but new referrals stop earning credits until older ones age out of the window.\n              <\u002Fp>\n            <\u002Fdiv>\n            <div class=\"how-foot\">\n              Credits are issued after a 30-day clawback period. Refunded, charged-back, or fraud-flagged referrals reverse the credit. Self-referrals, multi-account stacking, and incentivized signups violate the program and reset your code.\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsection>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fmain>\n<\u002Fdiv>\n\n<div class=\"toast\" id=\"toast\" role=\"status\" aria-live=\"polite\">\n  <span class=\"ind\"><\u002Fspan>\n  <span id=\"toastMsg\">Copied<\u002Fspan>\n<\u002Fdiv>\n\n<script>\n/* ===== Theme ===== */\ndocument.getElementById(\"theme-dark\").addEventListener(\"click\", () => {\n  document.documentElement.setAttribute(\"data-theme\",\"dark\");\n  document.getElementById(\"theme-dark\").setAttribute(\"aria-pressed\",\"true\");\n  document.getElementById(\"theme-light\").setAttribute(\"aria-pressed\",\"false\");\n});\ndocument.getElementById(\"theme-light\").addEventListener(\"click\", () => {\n  document.documentElement.setAttribute(\"data-theme\",\"light\");\n  document.getElementById(\"theme-light\").setAttribute(\"aria-pressed\",\"true\");\n  document.getElementById(\"theme-dark\").setAttribute(\"aria-pressed\",\"false\");\n});\n\n/* ===== Toast helper ===== */\nconst toast = document.getElementById(\"toast\");\nconst toastMsg = document.getElementById(\"toastMsg\");\nlet toastTimer;\nfunction showToast(msg){\n  toastMsg.textContent = msg;\n  toast.classList.add(\"show\");\n  clearTimeout(toastTimer);\n  toastTimer = setTimeout(() => toast.classList.remove(\"show\"), 1800);\n}\n\n/* ===== Clipboard ===== */\nfunction copyText(text){\n  if (navigator.clipboard && navigator.clipboard.writeText){\n    return navigator.clipboard.writeText(text);\n  }\n  const ta = document.createElement(\"textarea\");\n  ta.value = text; document.body.appendChild(ta);\n  ta.select(); try { document.execCommand(\"copy\"); } catch(e){}\n  document.body.removeChild(ta);\n  return Promise.resolve();\n}\n\ndocument.querySelectorAll(\"[data-copy]\").forEach(btn => {\n  btn.addEventListener(\"click\", (e) => {\n    e.preventDefault();\n    const text = btn.getAttribute(\"data-copy\");\n    const lbl = btn.getAttribute(\"data-label\") || \"text\";\n    copyText(text).then(() => {\n      // pill swap\n      const lblEl = btn.querySelector(\".lbl\");\n      if (lblEl){\n        const original = lblEl.textContent;\n        btn.classList.add(\"copied\");\n        const icon = btn.querySelector(\"svg use\");\n        if (icon) icon.setAttribute(\"href\",\"#i-check\");\n        lblEl.textContent = \"Copied\";\n        setTimeout(() => {\n          btn.classList.remove(\"copied\");\n          lblEl.textContent = original;\n          if (icon) icon.setAttribute(\"href\",\"#i-copy\");\n        }, 1600);\n      } else {\n        // share-row icon-only copy\n        const icon = btn.querySelector(\"svg use\");\n        if (icon){\n          const orig = icon.getAttribute(\"href\");\n          icon.setAttribute(\"href\",\"#i-check\");\n          setTimeout(() => icon.setAttribute(\"href\", orig), 1400);\n        }\n      }\n      showToast(\"Copied \" + (lbl === \"code\" ? \"referral code\" : lbl === \"link\" ? \"share link\" : \"to clipboard\"));\n    });\n  });\n});\n\n/* ===== Message picker ===== */\nconst LINK = \"https://fundedpal.com/?ref=tokunbo-7k2x\";\nconst messages = {\n  straight: \"FundedPal sits between my charts and the broker bridge and refuses any order that would breach prop firm rules. Saved me from blowing two challenges. Worth a look. \" + LINK,\n  brief:    \"If you're running a prop challenge, this is the guardrail I wish I'd had on attempt one. \" + LINK,\n  technical:\"Per-trade caps, daily soft caps, revenge-trade brake. Enforced at the broker bridge — can't be raised mid-drawdown. Free for the first paid month with my link. \" + LINK,\n  custom:   \"\"\n};\n\nconst msgList = document.getElementById(\"msgList\");\nconst customMsg = document.getElementById(\"customMsg\");\nconst customClosed = document.getElementById(\"customClosed\");\nconst msgLen = document.getElementById(\"msgLen\");\n\nfunction selectedMessage(){\n  const sel = msgList.querySelector(\".msg.selected\");\n  const key = sel ? sel.getAttribute(\"data-msg\") : \"straight\";\n  if (key === \"custom\"){\n    const raw = customMsg.value || customMsg.placeholder;\n    return raw.replace(/\\{link\\}/g, LINK);\n  }\n  return messages[key];\n}\n\nfunction updateLen(){\n  const text = selectedMessage();\n  const n = text.length;\n  let tail = \"~1 tweet\";\n  if (n > 280) tail = \"exceeds tweet length\";\n  else if (n > 160) tail = \"fits a tweet\";\n  else tail = \"fits an SMS\";\n  msgLen.textContent = n + \" characters · \" + tail;\n}\n\nmsgList.querySelectorAll(\".msg\").forEach(label => {\n  label.addEventListener(\"click\", () => {\n    msgList.querySelectorAll(\".msg\").forEach(m => m.classList.remove(\"selected\"));\n    label.classList.add(\"selected\");\n    const input = label.querySelector(\"input\");\n    if (input) input.checked = true;\n    const isCustom = label.getAttribute(\"data-msg\") === \"custom\";\n    customMsg.style.display = isCustom ? \"block\" : \"none\";\n    customClosed.style.display = isCustom ? \"none\" : \"block\";\n    if (isCustom) setTimeout(() => customMsg.focus(), 50);\n    updateLen();\n  });\n});\n\ncustomMsg.addEventListener(\"input\", updateLen);\n\ndocument.getElementById(\"copyMsgBtn\").addEventListener(\"click\", () => {\n  const text = selectedMessage();\n  copyText(text).then(() => {\n    const btn = document.getElementById(\"copyMsgBtn\");\n    const lbl = btn.querySelector(\".lbl\");\n    const icon = btn.querySelector(\"svg use\");\n    const original = lbl.textContent;\n    btn.classList.add(\"copied\");\n    icon.setAttribute(\"href\",\"#i-check\");\n    lbl.textContent = \"Copied with link\";\n    setTimeout(() => {\n      btn.classList.remove(\"copied\");\n      lbl.textContent = original;\n      icon.setAttribute(\"href\",\"#i-copy\");\n    }, 1800);\n    showToast(\"Copied message with link\");\n  });\n});\n\n/* ===== Share buttons (open prefilled where possible) ===== */\ndocument.querySelectorAll(\"[data-share]\").forEach(btn => {\n  btn.addEventListener(\"click\", (e) => {\n    e.preventDefault();\n    const platform = btn.getAttribute(\"data-share\");\n    const text = encodeURIComponent(selectedMessage());\n    let url = \"#\";\n    switch (platform){\n      case \"x\":         url = \"https://twitter.com/intent/tweet?text=\" + text; break;\n      case \"whatsapp\":  url = \"https://wa.me/?text=\" + text; break;\n      case \"telegram\":  url = \"https://t.me/share/url?url=\" + encodeURIComponent(LINK) + \"&text=\" + text; break;\n      case \"discord\":   copyText(decodeURIComponent(text)).then(() => showToast(\"Message copied — paste into Discord\")); return;\n    }\n    window.open(url, \"_blank\", \"noopener,noreferrer\");\n  });\n});\n\nupdateLen();\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
